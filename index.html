<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>自我管理体系 5天4夜健康百岁青年训练营 —— 爱的拍打</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Microsoft YaHei', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }

      .logo {
        max-width: 200px;
        margin-bottom: 10px;
      }

      h1 {
        color: white;
        text-align: center;
        font-size: 40px;
        font-weight: bold;
        margin-bottom: 30px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      .image-container {
        position: relative;
      }

      .subtitle-container {
        display: none;
        background: rgba(255, 255, 255, 0.2);
        padding: 15px 30px;
        border-radius: 30px;
      }

      .subtitle {
        color: white;
        font-size: 36px;
        font-weight: bold;
        text-align: center;
      }

      .timer-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }

      .timer-container {
        background: transparent;
        padding: 20px 40px;
        margin-bottom: 0;
      }

      .timer {
        font-size: 140px;
        font-weight: bold;
        color: white;
        text-align: center;
        font-family: 'Courier New', monospace;
        text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
      }

      .settings-btn {
        font-size: 18px;
        cursor: pointer;
        color: white;
        text-decoration: none;
        font-weight: normal;
        background: transparent;
        border: none;
        padding: 0;
        transition: all 0.3s ease;
        margin-top: 30px;
      }

      .settings-btn:hover {
        color: rgba(255, 255, 255, 0.8);
      }

      .custom-time-panel {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255, 255, 255, 0.95);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        z-index: 100;
        text-align: center;
      }

      .custom-time-panel.show {
        display: block;
      }

      .custom-time-panel h3 {
        color: #667eea;
        margin-bottom: 20px;
        font-size: 24px;
      }

      .custom-time-panel input {
        width: 100px;
        padding: 15px;
        font-size: 24px;
        border: 2px solid #667eea;
        border-radius: 10px;
        text-align: center;
        margin-bottom: 20px;
      }

      .custom-time-panel .btn-group {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .custom-time-panel .btn-group button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #667eea;
        color: white;
        transition: all 0.3s ease;
      }

      .custom-time-panel .btn-group button:hover {
        background: #5a6fd6;
      }

      .custom-time-panel .close-btn {
        padding: 10px 30px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #ff6b6b;
        color: white;
        transition: all 0.3s ease;
      }

      .custom-time-panel .close-btn:hover {
        background: #ee5a5a;
      }

      .overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 99;
      }

      .overlay.show {
        display: block;
      }

      .controls {
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .btn {
        padding: 12px 30px;
        font-size: 18px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: bold;
      }

      .btn-primary {
        background: #ff6b6b;
        color: white;
      }

      .btn-primary:hover {
        background: #ee5a5a;
        transform: translateY(-2px);
      }

      .btn-secondary {
        background: white;
        color: #667eea;
      }

      .btn-secondary:hover {
        background: #f0f0f0;
        transform: translateY(-2px);
      }

      .btn-group {
        display: flex;
        flex-wrap: nowrap;
        gap: 25px;
        justify-content: center;
        max-width: 1200px;
        margin-top: 40px;
        width: 100%;
      }

      .btn-subtitle {
        padding: 8px 16px;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.3);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      .btn-subtitle:hover {
        background: rgba(255, 255, 255, 0.5);
      }

      .btn-subtitle.active {
        background: white;
        color: #667eea;
      }

      .main-content {
        display: flex;
        gap: 50px;
        align-items: center;
        justify-content: center;
        max-width: 1200px;
        width: 100%;
        margin-bottom: -20px;
        margin-top: -50px;
      }

      .image-container {
        display: none;
        flex: 1;
        max-width: 350px;
        border-radius: 0;
        overflow: hidden;
        box-shadow: none;
        position: relative;
      }

      .image-container img {
        width: 100%;
        height: auto;
        display: block;
        border: none;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 24px;
        }

        .timer {
          font-size: 80px;
        }

        .timer-container {
          padding: 20px 30px;
        }

        .subtitle {
          font-size: 20px;
        }

        .main-content {
          flex-direction: column;
        }

        .image-container {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <img src="logo.png" alt="Logo" class="logo" />

    <h1>自我管理体系 5天4夜健康百岁青年训练营 —— 爱的拍打</h1>

    <div class="main-content">
      <div class="subtitle-container" id="subtitleContainer">
        <div class="subtitle" id="subtitle">头顶</div>
      </div>
      <div class="image-container" id="imageContainer">
        <img src="head_photo.jpg" alt="头部拍打示意图" />
      </div>
    </div>

    <div class="timer-wrapper">
      <div class="timer-container">
        <div class="timer" id="timer">03:00</div>
      </div>
      <button class="settings-btn" id="settingsBtn">设置</button>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="custom-time-panel" id="settingsPanel">
      <h3>设置倒计时时间</h3>
      <input type="number" id="timeInput" min="1" max="60" value="3" />
      <div class="btn-group">
        <button id="btn1min">1分钟</button>
        <button id="btn2min">2分钟</button>
        <button id="btn3min">3分钟</button>
        <button id="btn5min">5分钟</button>
      </div>
      <button class="close-btn" id="closePanelBtn">确认</button>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="startBtn">开始</button>
      <button class="btn btn-secondary" id="pauseBtn">暂停</button>
      <button class="btn btn-secondary" id="resetBtn">重置</button>
    </div>

    <div class="btn-group show">
      <button class="btn btn-subtitle active" data-subtitle="头顶">头顶</button>
      <button class="btn btn-subtitle" data-subtitle="头两侧">头两侧</button>
      <button class="btn btn-subtitle" data-subtitle="前后">前后</button>
      <button class="btn btn-subtitle" data-subtitle="后脑">后脑</button>
      <button class="btn btn-subtitle" data-subtitle="两腮">两腮</button>
      <button class="btn btn-subtitle" data-subtitle="眼睛">眼睛</button>
      <button class="btn btn-subtitle" data-subtitle="嘴巴">嘴巴</button>
      <button class="btn btn-subtitle" data-subtitle="耳朵">耳朵</button>
      <button class="btn btn-subtitle" data-subtitle="左颈部">左颈部</button>
      <button class="btn btn-subtitle" data-subtitle="右颈部">右颈部</button>
    </div>

    <script>
      const timerDisplay = document.getElementById('timer')
      const subtitleDisplay = document.getElementById('subtitle')
      const startBtn = document.getElementById('startBtn')
      const pauseBtn = document.getElementById('pauseBtn')
      const resetBtn = document.getElementById('resetBtn')
      const subtitleButtons = document.querySelectorAll('.btn-subtitle')
      const timeInput = document.getElementById('timeInput')
      const btn1min = document.getElementById('btn1min')
      const btn2min = document.getElementById('btn2min')
      const btn3min = document.getElementById('btn3min')
      const btn5min = document.getElementById('btn5min')
      const settingsBtn = document.getElementById('settingsBtn')
      const settingsPanel = document.getElementById('settingsPanel')
      const overlay = document.getElementById('overlay')
      const closePanelBtn = document.getElementById('closePanelBtn')

      let totalSeconds = 180
      let defaultSeconds = 180
      let timer = null
      let isRunning = false

      console.log(subtitle)
      function getImagePath(subtitle) {
        const imageMap = {
          头顶: 'photo_touding.png',
          头两侧: 'photo_touliangce.png',
          前后: 'photo_qianhou.png',
          后脑: 'photo_hounao.png',
          两腮: 'photo_liangsai.png',
          眼睛: 'photo_yanjing.png',
          嘴巴: 'photo_zuiba.png',
          耳朵: 'photo_erduo.png',
          左颈部: 'photo_zuojingbu.png',
          右颈部: 'photo_youjingbu.png',
        }
        return imageMap[subtitle] || 'photo_touding.png'
      }

      function setTime(minutes) {
        stopTimer()
        totalSeconds = minutes * 60
        defaultSeconds = minutes * 60
        timeInput.value = minutes
        timerDisplay.style.color = 'white'
        updateTimer()
        closeSettingsPanel()
      }

      function openSettingsPanel() {
        settingsPanel.classList.add('show')
        overlay.classList.add('show')
      }

      function closeSettingsPanel() {
        settingsPanel.classList.remove('show')
        overlay.classList.remove('show')
      }

      settingsBtn.addEventListener('click', openSettingsPanel)
      closePanelBtn.addEventListener('click', closeSettingsPanel)
      overlay.addEventListener('click', closeSettingsPanel)

      btn1min.addEventListener('click', () => setTime(1))
      btn2min.addEventListener('click', () => setTime(2))
      btn3min.addEventListener('click', () => setTime(3))
      btn5min.addEventListener('click', () => setTime(5))

      timeInput.addEventListener('change', () => {
        const minutes = parseInt(timeInput.value)
        if (minutes >= 1 && minutes <= 60) {
          setTime(minutes)
        }
      })

      function updateTimer() {
        const minutes = Math.floor(totalSeconds / 60)
        const seconds = totalSeconds % 60
        timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`

        if (totalSeconds <= 0) {
          stopTimer()
          timerDisplay.style.color = '#ff6b6b'
        }
      }

      function startTimer() {
        if (isRunning) return
        isRunning = true
        timer = setInterval(() => {
          if (totalSeconds > 0) {
            totalSeconds--
            updateTimer()
          }
        }, 1000)
      }

      function stopTimer() {
        isRunning = false
        if (timer) {
          clearInterval(timer)
          timer = null
        }
      }

      function resetTimer() {
        stopTimer()
        totalSeconds = defaultSeconds
        timerDisplay.style.color = 'white'
        updateTimer()
      }

      startBtn.addEventListener('click', startTimer)
      pauseBtn.addEventListener('click', stopTimer)
      resetBtn.addEventListener('click', resetTimer)

      const imageContainer = document.getElementById('imageContainer')
      const subtitleContainer = document.getElementById('subtitleContainer')

      subtitleButtons.forEach((btn) => {
        btn.addEventListener('click', () => {
          subtitleButtons.forEach((b) => b.classList.remove('active'))
          btn.classList.add('active')
          const currentSubtitle = btn.dataset.subtitle
          subtitleDisplay.textContent = currentSubtitle

          subtitleContainer.style.display = 'block'

          const imagePath = getImagePath(currentSubtitle)
          const imgElement = imageContainer.querySelector('img')
          if (imgElement) {
            imgElement.onerror = function () {
              imageContainer.style.display = 'none'
            }
            imgElement.onload = function () {
              imageContainer.style.display = 'block'
            }
            imgElement.src = imagePath
          }
        })
      })

      subtitleContainer.style.display = 'block'

      const defaultImg = imageContainer.querySelector('img')
      if (defaultImg) {
        defaultImg.onerror = function () {
          imageContainer.style.display = 'none'
        }
        defaultImg.onload = function () {
          imageContainer.style.display = 'block'
        }
        defaultImg.src = 'photo_touding.png';
      }

      updateTimer()
    </script>
  </body>
</html>
