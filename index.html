<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自我管理体系 5天4夜健康百岁青年训练营 —— 爱的拍打</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .logo {
            max-width: 200px;
            margin-bottom: 20px;
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle-container {
            background: rgba(255,255,255,0.2);
            padding: 15px 30px;
            border-radius: 30px;
            margin-bottom: 40px;
        }

        .subtitle {
            color: white;
            font-size: 36px;
            font-weight: bold;
            text-align: center;
        }

        .timer-container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px 60px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .timer {
            font-size: 96px;
            font-weight: bold;
            color: #333;
            text-align: center;
            font-family: 'Courier New', monospace;
        }

        .controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-primary {
            background: #ff6b6b;
            color: white;
        }

        .btn-primary:hover {
            background: #ee5a5a;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
        }

        .btn-secondary:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 800px;
            margin-top: 20px;
        }

        .btn-subtitle {
            padding: 10px 20px;
            font-size: 16px;
            background: rgba(255,255,255,0.3);
            color: white;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .btn-subtitle:hover {
            background: rgba(255,255,255,0.5);
        }

        .btn-subtitle.active {
            background: white;
            color: #667eea;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }
            
            .timer {
                font-size: 64px;
            }
            
            .timer-container {
                padding: 20px 30px;
            }
            
            .subtitle {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <img src="https://neeko-copilot.bytedance.net/api/text_to_image?prompt=A%20colorful%20logo%20with%20orange%20sun%20and%20colorful%20waves%20with%20Chinese%20characters%20below%20on%20white%20background&image_size=square_hd" alt="Logo" class="logo">
    
    <h1>自我管理体系 5天4夜健康百岁青年训练营 —— 爱的拍打</h1>
    
    <div class="subtitle-container">
        <div class="subtitle" id="subtitle">头顶</div>
    </div>
    
    <div class="timer-container">
        <div class="timer" id="timer">03:00</div>
    </div>
    
    <div class="controls">
        <button class="btn btn-primary" id="startBtn">开始</button>
        <button class="btn btn-secondary" id="pauseBtn">暂停</button>
        <button class="btn btn-secondary" id="resetBtn">重置</button>
    </div>
    
    <div class="btn-group">
        <button class="btn btn-subtitle active" data-subtitle="头顶">头顶</button>
        <button class="btn btn-subtitle" data-subtitle="头两侧">头两侧</button>
        <button class="btn btn-subtitle" data-subtitle="前后">前后</button>
        <button class="btn btn-subtitle" data-subtitle="后脑">后脑</button>
        <button class="btn btn-subtitle" data-subtitle="两腮">两腮</button>
        <button class="btn btn-subtitle" data-subtitle="眼睛">眼睛</button>
        <button class="btn btn-subtitle" data-subtitle="嘴巴">嘴巴</button>
        <button class="btn btn-subtitle" data-subtitle="耳朵">耳朵</button>
        <button class="btn btn-subtitle" data-subtitle="颈部">颈部</button>
    </div>

    <script>
        const timerDisplay = document.getElementById('timer');
        const subtitleDisplay = document.getElementById('subtitle');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const subtitleButtons = document.querySelectorAll('.btn-subtitle');

        let totalSeconds = 180;
        let timer = null;
        let isRunning = false;

        function updateTimer() {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (totalSeconds <= 0) {
                stopTimer();
                timerDisplay.style.color = '#ff6b6b';
            }
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            timer = setInterval(() => {
                if (totalSeconds > 0) {
                    totalSeconds--;
                    updateTimer();
                }
            }, 1000);
        }

        function stopTimer() {
            isRunning = false;
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
        }

        function resetTimer() {
            stopTimer();
            totalSeconds = 180;
            timerDisplay.style.color = '#333';
            updateTimer();
        }

        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', stopTimer);
        resetBtn.addEventListener('click', resetTimer);

        subtitleButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                subtitleButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                subtitleDisplay.textContent = btn.dataset.subtitle;
            });
        });

        updateTimer();
    </script>
</body>
</html>
